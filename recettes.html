<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grimoire — Recettes & Préparations</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--parch-light:#f5e9c9;--parch-dark:#c9a96e;--ink:#2c1a0e;--ink-faded:#5c3d1e;--sepia:#8b5e2a;--gold:#b8860b;--red-wax:#7a1f1f;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background-color:#120a02;background-image:radial-gradient(ellipse at 50% 30%,#2a1205 0%,transparent 70%);font-family:'IM Fell English',Georgia,serif;color:var(--ink);padding:2rem 1rem 4rem;}
    header{text-align:center;padding:2rem 1rem 1rem;}
    .header-divider{color:var(--gold);opacity:0.6;letter-spacing:0.6rem;font-size:0.9rem;}
    .site-title{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(2rem,5vw,3.5rem);color:#f5e9c9;text-shadow:0 0 30px rgba(180,120,30,0.5),2px 2px 0 #1a0a00;margin:0.3rem 0;}
    .site-subtitle{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.4rem;color:var(--parch-dark);text-transform:uppercase;}
    .nav-bar{max-width:900px;margin:1.5rem auto;display:flex;justify-content:space-between;align-items:center;padding:0 1rem;}
    .btn-back,.btn-new{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;border:1px solid var(--sepia);padding:0.5rem 1.2rem;cursor:pointer;transition:all 0.3s;text-decoration:none;display:inline-block;}
    .btn-back{background:transparent;color:var(--sepia);}
    .btn-back:hover{background:var(--sepia);color:#f5e9c9;}
    .btn-new{background:var(--ink);color:#f5e9c9;border-color:var(--gold);position:relative;}
    .btn-new::before{content:'';position:absolute;inset:2px;border:1px solid var(--gold);opacity:0.3;pointer-events:none;}
    .btn-new:hover{background:#1a0a00;}
    .loading-msg{text-align:center;color:var(--parch-dark);font-style:italic;margin:3rem 0;}
    .entries-container{max-width:900px;margin:0 auto;padding:0 0.5rem;}
    .entries-list{display:flex;flex-direction:column;gap:1.5rem;}
    .entry-card{background:linear-gradient(145deg,#f5e9c9 0%,#ecdaaa 100%);border:1px solid var(--parch-dark);box-shadow:3px 3px 0 rgba(0,0,0,0.4);padding:1.8rem 2rem 3.5rem 2.5rem;position:relative;animation:card-in 0.5s ease both;transition:transform 0.2s,box-shadow 0.2s;}
    .entry-card:hover{transform:translateY(-2px);box-shadow:5px 6px 0 rgba(0,0,0,0.5);}
    .entry-card::after{content:'';position:absolute;top:6px;right:6px;width:18px;height:18px;border-top:1.5px solid var(--gold);border-right:1.5px solid var(--gold);opacity:0.4;}
    .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem;flex-wrap:wrap;gap:0.5rem;}
    .entry-nom{font-family:'UnifrakturMaguntia',cursive;font-size:1.8rem;color:var(--ink);line-height:1.1;}
    .entry-tags{display:flex;gap:0.5rem;flex-wrap:wrap;}
    .entry-tag{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.12rem;color:var(--ink-faded);border:1px solid var(--parch-dark);padding:0.2rem 0.6rem;text-transform:uppercase;}
    .entry-divider{border:none;border-top:1px solid var(--parch-dark);margin:0.8rem 0;opacity:0.5;}
    .entry-section{margin-bottom:0.8rem;}
    .entry-section-label{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;margin-bottom:0.25rem;}
    .entry-section-content{font-size:0.92rem;color:var(--ink-faded);line-height:1.6;font-style:italic;white-space:pre-wrap;}
    .ingredients-block{background:rgba(139,94,42,0.06);border-left:2px solid var(--gold);padding:0.8rem 1rem;font-size:0.92rem;color:var(--ink-faded);line-height:1.8;white-space:pre-wrap;font-style:italic;}
    
    .empty-state{text-align:center;padding:4rem 1rem;color:var(--parch-dark);font-style:italic;}
    @keyframes card-in{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,5,0,0.85);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal{background:linear-gradient(160deg,#fdf3d8 0%,#f0dca8 40%,#e4c98a 100%);border:1px solid var(--parch-dark);box-shadow:0 0 0 4px #1a0f05,0 0 0 6px var(--sepia);width:100%;max-width:680px;padding:2.5rem 2rem;position:relative;animation:page-in 0.4s ease both;}
    @keyframes page-in{from{opacity:0;transform:translateY(20px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    .modal-corner{position:absolute;width:36px;height:36px;border-color:var(--gold);border-style:solid;opacity:0.5;}
    .modal-corner.tl{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}.modal-corner.tr{top:8px;right:8px;border-width:1.5px 1.5px 0 0;}.modal-corner.bl{bottom:8px;left:8px;border-width:0 0 1.5px 1.5px;}.modal-corner.br{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}
    .modal-title{font-family:'UnifrakturMaguntia',cursive;font-size:2rem;color:var(--ink);text-align:center;margin-bottom:0.3rem;}
    .modal-divider{text-align:center;color:var(--sepia);opacity:0.5;letter-spacing:0.4rem;margin-bottom:2rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
    .form-row.single{grid-template-columns:1fr;}
    .field{display:flex;flex-direction:column;gap:0.3rem;}
    .field label{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;}
    .field input,.field select,.field textarea{background:rgba(255,255,255,0.4);border:none;border-bottom:1.5px solid var(--parch-dark);padding:0.45rem 0.3rem;font-family:'IM Fell English',serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.3s;width:100%;}
    .field select{cursor:pointer;}.field input:focus,.field select:focus,.field textarea:focus{border-bottom-color:var(--gold);}
    .field textarea{resize:vertical;min-height:80px;border:1.5px solid var(--parch-dark);padding:0.5rem;}.field textarea:focus{border-color:var(--gold);}
    .section-title{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.2rem;color:var(--sepia);text-transform:uppercase;margin:1.5rem 0 0.8rem;padding-bottom:0.3rem;border-bottom:1px solid var(--parch-dark);}
    .modal-actions{display:flex;gap:1rem;margin-top:2rem;}
    .btn-cancel{flex:1;padding:0.75rem;background:transparent;border:1px solid var(--sepia);color:var(--sepia);font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
    .btn-cancel:hover{background:var(--sepia);color:#f5e9c9;}
    .btn-save{flex:2;padding:0.75rem;background:var(--ink);color:#f5e9c9;border:1px solid var(--gold);font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.2rem;text-transform:uppercase;cursor:pointer;position:relative;transition:background 0.3s;}
    .btn-save::before{content:'';position:absolute;inset:2px;border:1px solid var(--gold);opacity:0.3;pointer-events:none;}
    .btn-save:hover{background:#1a0a00;}
    .card-actions { display: flex; gap: 0.6rem; margin-top: 1.2rem; padding-top: 0.8rem; border-top: 1px solid var(--parch-dark); }
    .btn-modifier, .btn-delete {
      box-sizing: border-box;
      width: 7rem;
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.5rem;
      letter-spacing: 0.12rem;
      text-transform: uppercase;
      padding: 0.35rem 0;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: #fff;
      border: 1px solid var(--gold);
      color: var(--gold);
    }
    .btn-delete { border-color: var(--red-wax); color: var(--red-wax); }
    .btn-modifier:hover { background: var(--gold); color: var(--ink); }
    .btn-delete:hover { background: var(--red-wax); color: #fff; }

    .alpha-bar {
      max-width: 900px; margin: 0 auto 1.5rem; padding: 0 1rem;
      display: flex; flex-wrap: wrap; gap: 0.3rem;
    }
    .alpha-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.5rem; letter-spacing: 0.1rem;
      text-transform: uppercase;
      width: 1.8rem; height: 1.8rem;
      border: 1px solid var(--parch-dark);
      background: transparent; color: var(--parch-dark);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .alpha-btn:hover { border-color: var(--gold); color: var(--gold); }
    .alpha-btn.active { background: var(--ink); border-color: var(--gold); color: var(--parch-light); }
    .alpha-btn.all { width: auto; padding: 0 0.6rem; }
    .search-count { max-width: 900px; margin: -0.8rem auto 1rem; padding: 0 1rem; font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; letter-spacing: 0.12rem; color: var(--sepia); text-transform: uppercase; }
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">

  // RECHERCHE ALPHABETIQUE
  function filterAlpha(letter, btn) {
    document.querySelectorAll('.alpha-btn').forEach(function(b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    var cards = document.querySelectorAll('.entry-card');
    var count = 0;
    cards.forEach(function(card) {
      if (letter === '*') { card.style.display = ''; count++; return; }
      // Get first meaningful text - first non-empty text node
      var allText = card.innerText || card.textContent || '';
      var firstLine = allText.trim().split('\n')[0].trim();
      var firstChar = firstLine.charAt(0).toUpperCase();
      // Handle accented chars
      var normalized = firstChar
        .replace(/[ÉÈÊË]/g, 'E')
        .replace(/[ÀÂÄ]/g, 'A')
        .replace(/[ÎÏI]/g, 'I')
        .replace(/[ÔÖO]/g, 'O')
        .replace(/[ÙÛÜU]/g, 'U')
        .replace(/[Ç]/g, 'C');
      var match = normalized === letter;
      card.style.display = match ? '' : 'none';
      if (match) count++;
    });
    var countEl = document.getElementById('searchCount');
    if (countEl) countEl.textContent = letter !== '*' ? count + ' r\u00e9sultat' + (count > 1 ? 's' : '') : '';
  }
</script>
<script>
  // MODIFIER
  var _editId = null;

  function editEntry(id) {
    _editId = id;
    db.collection('recettes').doc(id).get().then(function(snap) {
      if (!snap.exists) return;
      var d = snap.data();
    var e0 = document.getElementById('f-nom'); if(e0) e0.value = d['nom'] || '';
    var e1 = document.getElementById('f-type'); if(e1) e1.value = d['type'] || '';
    var e2 = document.getElementById('f-intention'); if(e2) e2.value = d['intention'] || '';
    var e3 = document.getElementById('f-moment'); if(e3) e3.value = d['moment'] || '';
    var e4 = document.getElementById('f-ingredients'); if(e4) e4.value = d['ingredients'] || '';
    var e5 = document.getElementById('f-preparation'); if(e5) e5.value = d['preparation'] || '';
    var e6 = document.getElementById('f-conservation'); if(e6) e6.value = d['conservation'] || '';
    var e7 = document.getElementById('f-notes'); if(e7) e7.value = d['notes'] || '';
      var btn = document.querySelector('.btn-save');
      if(btn) { btn.textContent = 'Mettre a jour'; btn.onclick = _saveEdit; }
      openModal();
    }).catch(function(e) { console.error(e); alert('Erreur chargement.'); });
  }

  function _saveEdit() {
    if (!_editId) return;
    var btn = document.querySelector('.btn-save');
    if(btn) { btn.textContent = 'Mise a jour...'; btn.style.opacity = '0.7'; }
    var entry = {
      'nom': (document.getElementById('f-nom') ? document.getElementById('f-nom').value : ''),
      'type': (document.getElementById('f-type') ? document.getElementById('f-type').value : ''),
      'intention': (document.getElementById('f-intention') ? document.getElementById('f-intention').value : ''),
      'moment': (document.getElementById('f-moment') ? document.getElementById('f-moment').value : ''),
      'ingredients': (document.getElementById('f-ingredients') ? document.getElementById('f-ingredients').value : ''),
      'preparation': (document.getElementById('f-preparation') ? document.getElementById('f-preparation').value : ''),
      'conservation': (document.getElementById('f-conservation') ? document.getElementById('f-conservation').value : ''),
      'notes': (document.getElementById('f-notes') ? document.getElementById('f-notes').value : ''),
      updatedAt: new Date().toISOString()
    };
    db.collection('recettes').doc(_editId).update(entry).then(function() {
      _editId = null;
      if(btn) { btn.textContent = 'Sceller la fiche'; btn.onclick = saveEntry; btn.style.opacity = '1'; }
      closeModal(); loadEntries();
    }).catch(function(e) {
      console.error(e); alert('Erreur mise a jour.');
      if(btn) { btn.style.opacity = '1'; btn.textContent = 'Mettre a jour'; }
    });
  }
</script>

        const fc={apiKey:"AIzaSyBvStmkk99Z063MPHLlmeUywafIMGCTSAM",authDomain:"grimoire-commun.firebaseapp.com",projectId:"grimoire-commun",storageBucket:"grimoire-commun.firebasestorage.app",messagingSenderId:"401518708387",appId:"1:401518708387:web:2ca15dd180798dc28e2116",measurementId:"G-F0HFZG2H79"};
  ;
  auth.onAuthStateChanged(u=>{if(!u){window.location.href='/Grimoire/';return;}loadEntries();});
  async function loadEntries(){
    const list=document.getElementById('entriesList'),loading=document.getElementById('loadingMsg');
    try{
      const snap=await db.collection('recettes').orderBy('nom').get();
      loading.style.display='none';
      if(snap.empty){list.innerHTML='<div class="empty-state">Aucune recette consignée.<br/><em>Le grimoire attend tes préparations.</em></div>';return;}
      list.innerHTML='';snap.forEach(d=>list.appendChild(buildCard(d.data(),d.id)));
    }catch(e){loading.textContent='Erreur.';console.error(e);}
  }
  function buildCard(d,id){
    const card=document.createElement('div');card.className='entry-card';
    let html=`<div class="entry-header"><div class="entry-nom">${d.nom||'—'}</div><div class="entry-tags">${d.type?`<span class="entry-tag">${d.type}</span>`:''} ${d.moment?`<span class="entry-tag">${d.moment}</span>`:''}</div></div>`;
    if(d.intention) html+=`<div style="font-style:italic;color:var(--sepia);font-size:0.88rem;margin-bottom:0.6rem">${d.intention}</div>`;
    html+=`<hr class="entry-divider"/>`;
    if(d.ingredients) html+=`<div class="entry-section"><div class="entry-section-label">Ingrédients</div><div class="ingredients-block">${d.ingredients}</div></div>`;
    if(d.preparation) html+=`<div class="entry-section"><div class="entry-section-label">Préparation</div><div class="entry-section-content">${d.preparation}</div></div>`;
    if(d.conservation) html+=`<div class="entry-section"><div class="entry-section-label">Conservation</div><div class="entry-section-content">${d.conservation}</div></div>`;
    if(d.notes) html+=`<div class="entry-section"><div class="entry-section-label">Notes</div><div class="entry-section-content">${d.notes}</div></div>`;
    html += `<div class="card-actions"><button class="btn-modifier" onclick="editEntry(\'${id}\', this)">Modifier</button><button class="btn-delete" onclick="deleteEntry(\'${id}\', this)">Supprimer</button></div>`;
    card.innerHTML=html;return card;
  }
  async function saveEntry(){
    const nom=document.getElementById('f-nom').value.trim();if(!nom){alert('Le nom est obligatoire.');return;}
    const btn=document.querySelector('.btn-save');btn.textContent='Scellement...';btn.style.opacity='0.7';
    const entry={nom,type:document.getElementById('f-type').value,intention:document.getElementById('f-intention').value,moment:document.getElementById('f-moment').value,ingredients:document.getElementById('f-ingredients').value,preparation:document.getElementById('f-preparation').value,conservation:document.getElementById('f-conservation').value,notes:document.getElementById('f-notes').value,createdAt:new Date().toISOString()};
    try{await db.collection('recettes').add(entry);closeModal();loadEntries();}catch(e){console.error(e);alert('Erreur.');}
    btn.textContent='Sceller la recette';btn.style.opacity='1';
  };
  async function deleteEntry(id,b){if(!confirm('Supprimer ?'))return;try{await db.collection('recettes').doc(id).delete();b.closest('.entry-card').remove();}catch(e){console.error(e);}};
  function openModal(){document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';};
  function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';};
  document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});

  window.saveEdit = async function() {
    if (!currentEditId) return;
    const btn = document.querySelector('.btn-save');
    if(btn) { btn.textContent = 'Mise à jour...'; btn.style.opacity = '0.7'; }
    const d = currentEditData;
    const entry = { 'nom': document.getElementById('f-nom')?document.getElementById('f-nom').value:d['nom']||'', 'type': document.getElementById('f-type')?document.getElementById('f-type').value:d['type']||'', 'intention': document.getElementById('f-intention')?document.getElementById('f-intention').value:d['intention']||'', 'moment': document.getElementById('f-moment')?document.getElementById('f-moment').value:d['moment']||'', 'ingredients': document.getElementById('f-ingredients')?document.getElementById('f-ingredients').value:d['ingredients']||'', 'preparation': document.getElementById('f-preparation')?document.getElementById('f-preparation').value:d['preparation']||'', 'conservation': document.getElementById('f-conservation')?document.getElementById('f-conservation').value:d['conservation']||'', 'notes': document.getElementById('f-notes')?document.getElementById('f-notes').value:d['notes']||'', updatedAt: new Date().toISOString() };
    try {
      await db.collection('recettes').doc(currentEditId).update( entry);
      currentEditId = null;
      // Reset save button
      if(btn) { btn.textContent = 'Sceller la fiche'; btn.onclick = saveEntry; btn.style.opacity = '1'; }
      closeModal();
      loadEntries();
    } catch(e) { console.error(e); alert('Erreur mise à jour.'); if(btn) { btn.style.opacity='1'; btn.textContent='Mettre à jour'; } }
  };
</script>
