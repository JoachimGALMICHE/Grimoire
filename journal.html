<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grimoire — Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --parch-light: #f5e9c9;
      --parch-mid:   #e8d5a3;
      --parch-dark:  #c9a96e;
      --ink:         #2c1a0e;
      --ink-faded:   #5c3d1e;
      --sepia:       #8b5e2a;
      --gold:        #b8860b;
      --gold-light:  #d4a820;
      --red-wax:     #7a1f1f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #120a02;
      background-image: radial-gradient(ellipse at 50% 30%, #2a1205 0%, transparent 70%);
      font-family: 'IM Fell English', Georgia, serif;
      color: var(--ink);
      padding: 2rem 1rem 4rem;
    }

    /* Header */
    header { text-align: center; padding: 2rem 1rem 1rem; animation: fade-in 1s ease both; }
    .header-divider { color: var(--gold); opacity: 0.6; letter-spacing: 0.6rem; font-size: 0.9rem; }
    .site-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--parch-light);
      text-shadow: 0 0 30px rgba(180,120,30,0.5), 2px 2px 0 #1a0a00;
      margin: 0.3rem 0;
    }
    .site-subtitle {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.4rem;
      color: var(--parch-dark); text-transform: uppercase;
    }

    /* Nav bar */
    .nav-bar {
      max-width: 900px; margin: 1.5rem auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 1rem;
    }
    .btn-back, .btn-new {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.15rem; text-transform: uppercase;
      border: 1px solid var(--sepia); padding: 0.5rem 1.2rem;
      cursor: pointer; transition: all 0.3s; text-decoration: none;
      display: inline-block;
    }
    .btn-back { background: transparent; color: var(--sepia); }
    .btn-back:hover { background: var(--sepia); color: var(--parch-light); }
    .btn-new {
      background: var(--ink); color: var(--parch-light);
      border-color: var(--gold); position: relative;
    }
    .btn-new::before { content: ''; position: absolute; inset: 2px; border: 1px solid var(--gold); opacity: 0.3; pointer-events: none; }
    .btn-new:hover { background: #1a0a00; letter-spacing: 0.25rem; }

    /* Loading state */
    .loading-msg {
      text-align: center; color: var(--parch-dark);
      font-style: italic; margin: 3rem 0;
      animation: fade-in 0.5s ease;
    }

    /* Entries grid */
    .entries-container { max-width: 900px; margin: 0 auto; padding: 0 0.5rem; }
    .entries-list { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Entry card */
    .entry-card {
      background: linear-gradient(145deg, #f5e9c9 0%, #ecdaaa 100%);
      border: 1px solid var(--parch-dark);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
      padding: 1.8rem 2rem;
      position: relative;
      animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .entry-card:hover { transform: translateY(-2px); box-shadow: 5px 6px 0 rgba(0,0,0,0.5); }
    .entry-card::after {
      content: '';
      position: absolute; top: 6px; right: 6px;
      width: 18px; height: 18px;
      border-top: 1.5px solid var(--gold);
      border-right: 1.5px solid var(--gold);
      opacity: 0.4;
    }

    .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .entry-date {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.7rem; letter-spacing: 0.15rem;
      color: var(--sepia); text-transform: uppercase;
    }
    .entry-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tag {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem; letter-spacing: 0.1rem;
      color: var(--ink-faded); border: 1px solid var(--parch-dark);
      padding: 0.2rem 0.5rem; text-transform: uppercase;
    }

    .entry-raison {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.75rem; color: var(--ink);
      margin-bottom: 0.6rem; letter-spacing: 0.05rem;
    }
    .entry-divider { border: none; border-top: 1px solid var(--parch-dark); margin: 0.8rem 0; opacity: 0.5; }

    .entry-section { margin-bottom: 0.8rem; }
    .entry-section-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem; letter-spacing: 0.15rem;
      color: var(--sepia); text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .entry-section-content {
      font-size: 0.92rem; color: var(--ink-faded);
      line-height: 1.6; font-style: italic;
      white-space: pre-wrap;
    }

    .entry-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .meta-item { font-size: 0.82rem; color: var(--ink-faded); }
    .meta-label { font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; letter-spacing: 0.1rem; color: var(--sepia); text-transform: uppercase; display: block; margin-bottom: 0.1rem; }

    .btn-delete {
      position: absolute; bottom: 1rem; right: 1rem;
      background: transparent; border: 1px solid var(--red-wax);
      color: var(--red-wax); font-family: 'Cinzel Decorative', serif;
      font-size: 0.5rem; letter-spacing: 0.1rem; padding: 0.25rem 0.6rem;
      cursor: pointer; text-transform: uppercase; opacity: 0.5;
      transition: opacity 0.3s;
    }
    .btn-delete:hover { opacity: 1; }

    @keyframes card-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fade-in  { from { opacity: 0; } to { opacity: 1; } }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 4rem 1rem;
      color: var(--parch-dark); font-style: italic;
      font-size: 0.95rem;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,5,0,0.85); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: linear-gradient(160deg, #fdf3d8 0%, #f0dca8 40%, #e4c98a 100%);
      border: 1px solid var(--parch-dark);
      box-shadow: 0 0 0 4px #1a0f05, 0 0 0 6px var(--sepia), 0 0 40px rgba(180,120,30,0.3);
      width: 100%; max-width: 680px;
      padding: 2.5rem 2rem;
      position: relative;
      animation: page-in 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes page-in { from { opacity:0; transform: translateY(20px) scale(0.98); } to { opacity:1; transform: translateY(0) scale(1); } }

    .modal-corner { position: absolute; width: 36px; height: 36px; border-color: var(--gold); border-style: solid; opacity: 0.5; }
    .modal-corner.tl { top: 8px; left: 8px; border-width: 1.5px 0 0 1.5px; }
    .modal-corner.tr { top: 8px; right: 8px; border-width: 1.5px 1.5px 0 0; }
    .modal-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1.5px 1.5px; }
    .modal-corner.br { bottom: 8px; right: 8px; border-width: 0 1.5px 1.5px 0; }

    .modal-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 2rem; color: var(--ink); text-align: center;
      margin-bottom: 0.3rem;
      text-shadow: 1px 1px 0 var(--parch-dark);
    }
    .modal-divider { text-align: center; color: var(--sepia); opacity: 0.5; letter-spacing: 0.4rem; margin-bottom: 2rem; }

    /* Form fields */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
    .form-row.trio { grid-template-columns: 1fr 1fr 1fr; }
    .form-row.single { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem; letter-spacing: 0.15rem;
      color: var(--sepia); text-transform: uppercase;
    }
    .field input, .field select, .field textarea {
      background: rgba(255,255,255,0.4);
      border: none; border-bottom: 1.5px solid var(--parch-dark);
      padding: 0.45rem 0.3rem;
      font-family: 'IM Fell English', serif;
      font-size: 0.9rem; color: var(--ink); outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }
    .field select { cursor: pointer; }
    .field input:focus, .field select:focus, .field textarea:focus { border-bottom-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 80px; border: 1.5px solid var(--parch-dark); padding: 0.5rem; }
    .field textarea:focus { border-color: var(--gold); }

    .section-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.2rem;
      color: var(--sepia); text-transform: uppercase;
      margin: 1.5rem 0 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--parch-dark);
    }

    /* Checkbox sections */
    .check-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .check-row input[type="checkbox"] { accent-color: var(--ink); width: 14px; height: 14px; cursor: pointer; }
    .check-row label { font-family: 'Cinzel Decorative', serif; font-size: 0.6rem; letter-spacing: 0.1rem; color: var(--sepia); text-transform: uppercase; cursor: pointer; }

    .conditional { display: none; margin-top: 0.6rem; }
    .conditional.show { display: block; }

    /* Modal buttons */
    .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
    .btn-cancel {
      flex: 1; padding: 0.75rem;
      background: transparent; border: 1px solid var(--sepia);
      color: var(--sepia); font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.15rem; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-cancel:hover { background: var(--sepia); color: var(--parch-light); }
    .btn-save {
      flex: 2; padding: 0.75rem;
      background: var(--ink); color: var(--parch-light);
      border: 1px solid var(--gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.2rem; text-transform: uppercase;
      cursor: pointer; position: relative; transition: background 0.3s;
    }
    .btn-save::before { content: ''; position: absolute; inset: 2px; border: 1px solid var(--gold); opacity: 0.3; pointer-events: none; }
    .btn-save:hover { background: #1a0a00; }

    footer { text-align: center; margin-top: 3rem; color: var(--sepia); font-style: italic; font-size: 0.8rem; opacity: 0.5; }
  </style>
</head>
<body>

<header>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
  <h1 class="site-title">Journal</h1>
  <p class="site-subtitle">Livre de l'Éclypse</p>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
</header>

<div class="nav-bar">
  <a class="btn-back" href="/Grimoire/menu.html">Retour au menu</a>
  <button class="btn-new" onclick="openModal()">Créer une fiche</button>
</div>

<div class="entries-container">
  <div class="loading-msg" id="loadingMsg">Consultation des archives...</div>
  <div class="entries-list" id="entriesList"></div>
</div>

<footer>&#10022; &nbsp; Les mots écrits ici demeurent dans l'éternité &nbsp; &#10022;</footer>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-corner tl"></div>
    <div class="modal-corner tr"></div>
    <div class="modal-corner bl"></div>
    <div class="modal-corner br"></div>

    <div class="modal-title">Nouvelle Fiche</div>
    <div class="modal-divider">&#8212; &#10022; &#8212;</div>

    <!-- Informations de base -->
    <div class="section-title">Informations du jour</div>

    <div class="form-row">
      <div class="field">
        <label for="f-date">Date</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="field">
        <label for="f-saison">Saison</label>
        <select id="f-saison">
          <option value="">— Choisir —</option>
          <option>Printemps</option>
          <option>Été</option>
          <option>Automne</option>
          <option>Hiver</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="f-lune">Phase / Fête</label>
        <select id="f-lune">
          <option value="">— Choisir —</option>
          <optgroup label="Phases lunaires">
            <option>Nouvelle Lune</option>
            <option>Premier Croissant</option>
            <option>Premier Quartier</option>
            <option>Lune Gibbeuse Croissante</option>
            <option>Pleine Lune</option>
            <option>Lune Gibbeuse Décroissante</option>
            <option>Dernier Quartier</option>
            <option>Dernier Croissant</option>
          </optgroup>
          <optgroup label="Fêtes">
            <option>Imbolc</option>
            <option>Ostara — Équinoxe de Printemps</option>
            <option>Beltane</option>
            <option>Litha — Solstice d'Été</option>
            <option>Lughnasadh</option>
            <option>Mabon — Équinoxe d'Automne</option>
            <option>Samhain</option>
            <option>Yule — Solstice d'Hiver</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label for="f-meteo">Météo</label>
        <select id="f-meteo">
          <option value="">— Choisir —</option>
          <option>Clair / Ensoleillé</option>
          <option>Nuageux</option>
          <option>Couvert</option>
          <option>Pluvieux</option>
          <option>Orageux</option>
          <option>Brumeux</option>
          <option>Neigeux</option>
          <option>Venteux</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="f-humeur">Humeur</label>
        <select id="f-humeur">
          <option value="">— Choisir —</option>
          <option>Sereine</option>
          <option>Joyeuse</option>
          <option>Mélancolique</option>
          <option>Troublée</option>
          <option>Fatiguée</option>
          <option>Inspirée</option>
          <option>En colère</option>
          <option>Neutre</option>
        </select>
      </div>
      <div class="field">
        <label for="f-energie">État énergétique</label>
        <select id="f-energie">
          <option value="">— Choisir —</option>
          <option>Très haute</option>
          <option>Haute</option>
          <option>Équilibrée</option>
          <option>Basse</option>
          <option>Très basse</option>
          <option>Chaotique</option>
          <option>En transformation</option>
        </select>
      </div>
    </div>

    <div class="form-row single">
      <div class="field">
        <label for="f-raison">Raison de la fiche</label>
        <input type="text" id="f-raison" placeholder="Pourquoi j'écris cette fiche aujourd'hui..."/>
      </div>
    </div>

    <!-- Contenu -->
    <div class="section-title">Contenu</div>

    <div class="form-row single">
      <div class="field">
        <label for="f-texte">Texte libre — réflexions, vécu</label>
        <textarea id="f-texte" placeholder="Écrire librement..."></textarea>
      </div>
    </div>

    <div class="check-row">
      <input type="checkbox" id="cb-reve" onchange="toggleSection('reve', this.checked)"/>
      <label for="cb-reve">Rêve noté</label>
    </div>
    <div class="conditional" id="sec-reve">
      <div class="field">
        <label for="f-reve">Description du rêve</label>
        <textarea id="f-reve" placeholder="Ce que j'ai rêvé..."></textarea>
      </div>
    </div>

    <div class="check-row" style="margin-top:0.6rem">
      <input type="checkbox" id="cb-tirage" onchange="toggleSection('tirage', this.checked)"/>
      <label for="cb-tirage">Tirage effectué</label>
    </div>
    <div class="conditional" id="sec-tirage">
      <div class="form-row">
        <div class="field">
          <label for="f-tirage-type">Type de tirage</label>
          <select id="f-tirage-type">
            <option value="">— Choisir —</option>
            <option>Tarot</option>
            <option>Oracle</option>
            <option>Runes</option>
          </select>
        </div>
        <div class="field">
          <label for="f-tirage-cartes">Cartes / Runes tirées</label>
          <input type="text" id="f-tirage-cartes" placeholder="Ex: Le Soleil, La Lune..."/>
        </div>
      </div>
      <div class="field" style="margin-top:0.5rem">
        <label for="f-tirage-interp">Interprétation</label>
        <textarea id="f-tirage-interp" placeholder="Ce que ce tirage m'a dit..."></textarea>
      </div>
    </div>

    <div class="check-row" style="margin-top:0.6rem">
      <input type="checkbox" id="cb-intention" onchange="toggleSection('intention', this.checked)"/>
      <label for="cb-intention">Intention posée</label>
    </div>
    <div class="conditional" id="sec-intention">
      <div class="field">
        <label for="f-intention">L'intention</label>
        <textarea id="f-intention" placeholder="L'intention que je pose aujourd'hui..."></textarea>
      </div>
    </div>

    <div class="check-row" style="margin-top:0.6rem">
      <input type="checkbox" id="cb-rituel" onchange="toggleSection('rituel', this.checked)"/>
      <label for="cb-rituel">Rituel pratiqué</label>
    </div>
    <div class="conditional" id="sec-rituel">
      <div class="field">
        <label for="f-rituel">Description du rituel</label>
        <textarea id="f-rituel" placeholder="Le rituel pratiqué, ses étapes, ses ressentis..."></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEntry()">Sceller la fiche</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvStmkk99Z063MPHLlmeUywafIMGCTSAM",
    authDomain: "grimoire-commun.firebaseapp.com",
    projectId: "grimoire-commun",
    storageBucket: "grimoire-commun.firebasestorage.app",
    messagingSenderId: "401518708387",
    appId: "1:401518708387:web:2ca15dd180798dc28e2116",
    measurementId: "G-F0HFZG2H79"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Auth guard
  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = '/Grimoire/'; return; }
    loadEntries();
  });

  // Set today's date by default
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value = today;

  // Auto-detect saison
  const month = new Date().getMonth() + 1;
  const saisons = ['Hiver','Hiver','Printemps','Printemps','Printemps','Été','Été','Été','Automne','Automne','Automne','Hiver'];
  document.getElementById('f-saison').value = saisons[month - 1];

  // Load entries
  async function loadEntries() {
    const list = document.getElementById('entriesList');
    const loading = document.getElementById('loadingMsg');
    try {
      const q = query(collection(db, 'journal'), orderBy('date', 'desc'));
      const snap = await getDocs(q);
      loading.style.display = 'none';
      if (snap.empty) {
        list.innerHTML = '<div class="empty-state">Aucune fiche pour le moment.<br/><em>Le grimoire attend tes premiers mots.</em></div>';
        return;
      }
      list.innerHTML = '';
      snap.forEach(docSnap => {
        const d = docSnap.data();
        list.appendChild(buildCard(d, docSnap.id));
      });
    } catch(e) {
      loading.textContent = 'Erreur lors du chargement.';
      console.error(e);
    }
  }

  function buildCard(d, id) {
    const card = document.createElement('div');
    card.className = 'entry-card';

    // Format date
    const dateStr = d.date ? new Date(d.date + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) : '—';

    let html = `
      <div class="entry-header">
        <div class="entry-date">${dateStr}</div>
        <div class="entry-tags">
          ${d.lune ? `<span class="tag">${d.lune}</span>` : ''}
          ${d.saison ? `<span class="tag">${d.saison}</span>` : ''}
          ${d.meteo ? `<span class="tag">${d.meteo}</span>` : ''}
        </div>
      </div>`;

    if (d.raison) html += `<div class="entry-raison">${d.raison}</div>`;
    html += `<hr class="entry-divider"/>`;

    html += `<div class="entry-meta">`;
    if (d.humeur) html += `<div class="meta-item"><span class="meta-label">Humeur</span>${d.humeur}</div>`;
    if (d.energie) html += `<div class="meta-item"><span class="meta-label">Énergie</span>${d.energie}</div>`;
    html += `</div>`;

    if (d.texte) html += `<div class="entry-section"><div class="entry-section-label">Réflexions</div><div class="entry-section-content">${d.texte}</div></div>`;
    if (d.reve) html += `<div class="entry-section"><div class="entry-section-label">Rêve</div><div class="entry-section-content">${d.reve}</div></div>`;
    if (d.tirage_type) {
      html += `<div class="entry-section"><div class="entry-section-label">Tirage — ${d.tirage_type}</div>`;
      if (d.tirage_cartes) html += `<div class="entry-section-content">${d.tirage_cartes}</div>`;
      if (d.tirage_interp) html += `<div class="entry-section-content" style="margin-top:0.3rem">${d.tirage_interp}</div>`;
      html += `</div>`;
    }
    if (d.intention) html += `<div class="entry-section"><div class="entry-section-label">Intention</div><div class="entry-section-content">${d.intention}</div></div>`;
    if (d.rituel) html += `<div class="entry-section"><div class="entry-section-label">Rituel</div><div class="entry-section-content">${d.rituel}</div></div>`;

    html += `<button class="btn-delete" onclick="deleteEntry('${id}', this)">Supprimer</button>`;

    card.innerHTML = html;
    return card;
  }

  window.saveEntry = async function() {
    const btn = document.querySelector('.btn-save');
    btn.textContent = 'Scellement en cours…';
    btn.style.opacity = '0.7';

    const entry = {
      date:         document.getElementById('f-date').value,
      saison:       document.getElementById('f-saison').value,
      lune:         document.getElementById('f-lune').value,
      meteo:        document.getElementById('f-meteo').value,
      humeur:       document.getElementById('f-humeur').value,
      energie:      document.getElementById('f-energie').value,
      raison:       document.getElementById('f-raison').value,
      texte:        document.getElementById('f-texte').value,
      reve:         document.getElementById('cb-reve').checked ? document.getElementById('f-reve').value : '',
      tirage_type:  document.getElementById('cb-tirage').checked ? document.getElementById('f-tirage-type').value : '',
      tirage_cartes:document.getElementById('cb-tirage').checked ? document.getElementById('f-tirage-cartes').value : '',
      tirage_interp:document.getElementById('cb-tirage').checked ? document.getElementById('f-tirage-interp').value : '',
      intention:    document.getElementById('cb-intention').checked ? document.getElementById('f-intention').value : '',
      rituel:       document.getElementById('cb-rituel').checked ? document.getElementById('f-rituel').value : '',
      createdAt:    new Date().toISOString()
    };

    try {
      await addDoc(collection(db, 'journal'), entry);
      closeModal();
      loadEntries();
    } catch(e) {
      console.error(e);
      alert('Erreur lors de la sauvegarde. Vérifie les règles Firestore.');
    }
    btn.textContent = 'Sceller la fiche';
    btn.style.opacity = '1';
  };

  window.deleteEntry = async function(id, btnEl) {
    if (!confirm('Supprimer cette fiche définitivement ?')) return;
    try {
      await deleteDoc(doc(db, 'journal', id));
      btnEl.closest('.entry-card').remove();
      if (!document.querySelector('.entry-card')) {
        document.getElementById('entriesList').innerHTML = '<div class="empty-state">Aucune fiche pour le moment.<br/><em>Le grimoire attend tes premiers mots.</em></div>';
      }
    } catch(e) { console.error(e); }
  };

  window.openModal = function() {
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.toggleSection = function(name, show) {
    document.getElementById('sec-' + name).classList.toggle('show', show);
  };

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>

</body>
</html>
