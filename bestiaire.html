<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grimoire — Bestiaire</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --parch-light: #f5e9c9;
      --parch-mid:   #e8d5a3;
      --parch-dark:  #c9a96e;
      --ink:         #2c1a0e;
      --ink-faded:   #5c3d1e;
      --sepia:       #8b5e2a;
      --gold:        #b8860b;
      --gold-light:  #d4a820;
      --red-wax:     #7a1f1f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #120a02;
      background-image: radial-gradient(ellipse at 50% 30%, #2a1205 0%, transparent 70%);
      font-family: 'IM Fell English', Georgia, serif;
      color: var(--ink);
      padding: 2rem 1rem 4rem;
    }

    header { text-align: center; padding: 2rem 1rem 1rem; animation: fade-in 1s ease both; }
    .header-divider { color: var(--gold); opacity: 0.6; letter-spacing: 0.6rem; font-size: 0.9rem; }
    .site-title {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--parch-light);
      text-shadow: 0 0 30px rgba(180,120,30,0.5), 2px 2px 0 #1a0a00;
      margin: 0.3rem 0;
    }
    .site-subtitle { font-family: 'Cinzel Decorative', serif; font-size: 0.6rem; letter-spacing: 0.4rem; color: var(--parch-dark); text-transform: uppercase; }

    .nav-bar {
      max-width: 1100px; margin: 1.5rem auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 1rem;
    }
    .btn-back, .btn-new {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.15rem; text-transform: uppercase;
      border: 1px solid var(--sepia); padding: 0.5rem 1.2rem;
      cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-block;
    }
    .btn-back { background: transparent; color: var(--sepia); }
    .btn-back:hover { background: var(--sepia); color: var(--parch-light); }
    .btn-new { background: var(--ink); color: var(--parch-light); border-color: var(--gold); position: relative; }
    .btn-new::before { content: ''; position: absolute; inset: 2px; border: 1px solid var(--gold); opacity: 0.3; pointer-events: none; }
    .btn-new:hover { background: #1a0a00; letter-spacing: 0.25rem; }

    .loading-msg { text-align: center; color: var(--parch-dark); font-style: italic; margin: 3rem 0; }

    /* Grid */
    .grid-container { max-width: 1100px; margin: 0 auto; padding: 0 0.5rem; }
    .beast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.4rem;
    }

    /* Beast card */
    .beast-card {
      background: linear-gradient(145deg, #f5e9c9 0%, #ecdaaa 100%);
      border: 1px solid var(--parch-dark);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
      position: relative;
      cursor: pointer;
      animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both;
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .beast-card:hover { transform: translateY(-3px); box-shadow: 5px 6px 0 rgba(0,0,0,0.5); }
    .beast-card::after {
      content: ''; position: absolute; top: 6px; right: 6px;
      width: 16px; height: 16px;
      border-top: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold);
      opacity: 0.4;
    }



    .beast-body { padding: 1.2rem 1.2rem 2.5rem; }
    .beast-type {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.5rem; letter-spacing: 0.15rem; text-transform: uppercase;
      color: var(--sepia); margin-bottom: 0.3rem;
    }
    .beast-name {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: 1.5rem; color: var(--ink); line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .beast-origine {
      font-size: 0.78rem; font-style: italic; color: var(--ink-faded);
      margin-bottom: 0.6rem;
    }
    .beast-desc {
      font-size: 0.82rem; color: var(--ink-faded); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-delete {
      position: absolute; bottom: 0.7rem; right: 0.8rem;
      background: transparent; border: 1px solid var(--red-wax);
      color: var(--red-wax); font-family: 'Cinzel Decorative', serif;
      font-size: 0.5rem; letter-spacing: 0.1rem; padding: 0.2rem 0.5rem;
      cursor: pointer; text-transform: uppercase; opacity: 0.4; transition: opacity 0.3s;
    }
    .btn-delete:hover { opacity: 1; }

    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--parch-dark); font-style: italic; font-size: 0.95rem; }

    @keyframes card-in { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fade-in  { from { opacity: 0; } to { opacity: 1; } }

    /* ===== FICHE DETAIL ===== */
    .detail-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,5,0,0.9); z-index: 200;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .detail-overlay.open { display: flex; }
    .detail-modal {
      background: linear-gradient(160deg, #fdf3d8 0%, #f0dca8 40%, #e4c98a 100%);
      border: 1px solid var(--parch-dark);
      box-shadow: 0 0 0 4px #1a0f05, 0 0 0 6px var(--sepia);
      width: 100%; max-width: 700px;
      padding: 2.5rem 2rem; position: relative;
      animation: page-in 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .detail-type { font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; letter-spacing: 0.2rem; color: var(--sepia); text-transform: uppercase; margin-bottom: 0.3rem; }
    .detail-name { font-family: 'UnifrakturMaguntia', cursive; font-size: 2.5rem; color: var(--ink); margin-bottom: 0.2rem; }
    .detail-origine { font-size: 0.85rem; font-style: italic; color: var(--ink-faded); margin-bottom: 1.2rem; }
    .detail-divider { border: none; border-top: 1px solid var(--parch-dark); margin: 1rem 0; opacity: 0.5; }
    .detail-section { margin-bottom: 1rem; }
    .detail-label { font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; letter-spacing: 0.15rem; color: var(--sepia); text-transform: uppercase; margin-bottom: 0.3rem; }
    .detail-content { font-size: 0.92rem; color: var(--ink-faded); line-height: 1.7; white-space: pre-wrap; }
    .btn-close-detail {
      position: absolute; top: 1rem; right: 1rem;
      background: transparent; border: 1px solid var(--sepia);
      color: var(--sepia); font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem; letter-spacing: 0.1rem; padding: 0.3rem 0.7rem;
      cursor: pointer; text-transform: uppercase; transition: all 0.3s;
    }
    .btn-close-detail:hover { background: var(--sepia); color: var(--parch-light); }

    /* ===== MODAL CREATION ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,5,0,0.85); z-index: 100;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: linear-gradient(160deg, #fdf3d8 0%, #f0dca8 40%, #e4c98a 100%);
      border: 1px solid var(--parch-dark);
      box-shadow: 0 0 0 4px #1a0f05, 0 0 0 6px var(--sepia), 0 0 40px rgba(180,120,30,0.3);
      width: 100%; max-width: 680px;
      padding: 2.5rem 2rem; position: relative;
      animation: page-in 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes page-in { from { opacity:0; transform: translateY(20px) scale(0.98); } to { opacity:1; transform: translateY(0) scale(1); } }

    .modal-corner { position: absolute; width: 36px; height: 36px; border-color: var(--gold); border-style: solid; opacity: 0.5; }
    .modal-corner.tl { top: 8px; left: 8px; border-width: 1.5px 0 0 1.5px; }
    .modal-corner.tr { top: 8px; right: 8px; border-width: 1.5px 1.5px 0 0; }
    .modal-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1.5px 1.5px; }
    .modal-corner.br { bottom: 8px; right: 8px; border-width: 0 1.5px 1.5px 0; }

    .modal-title { font-family: 'UnifrakturMaguntia', cursive; font-size: 2rem; color: var(--ink); text-align: center; margin-bottom: 0.3rem; text-shadow: 1px 1px 0 var(--parch-dark); }
    .modal-divider { text-align: center; color: var(--sepia); opacity: 0.5; letter-spacing: 0.4rem; margin-bottom: 2rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
    .form-row.single { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; letter-spacing: 0.15rem; color: var(--sepia); text-transform: uppercase; }
    .field input, .field select, .field textarea {
      background: rgba(255,255,255,0.4); border: none;
      border-bottom: 1.5px solid var(--parch-dark);
      padding: 0.45rem 0.3rem; font-family: 'IM Fell English', serif;
      font-size: 0.9rem; color: var(--ink); outline: none;
      transition: border-color 0.3s; width: 100%;
    }
    .field select { cursor: pointer; }
    .field input:focus, .field select:focus, .field textarea:focus { border-bottom-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 80px; border: 1.5px solid var(--parch-dark); padding: 0.5rem; }
    .field textarea:focus { border-color: var(--gold); }

    .section-title {
      font-family: 'Cinzel Decorative', serif; font-size: 0.6rem;
      letter-spacing: 0.2rem; color: var(--sepia); text-transform: uppercase;
      margin: 1.5rem 0 0.8rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--parch-dark);
    }



    .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
    .btn-cancel {
      flex: 1; padding: 0.75rem; background: transparent;
      border: 1px solid var(--sepia); color: var(--sepia);
      font-family: 'Cinzel Decorative', serif; font-size: 0.6rem;
      letter-spacing: 0.15rem; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    }
    .btn-cancel:hover { background: var(--sepia); color: var(--parch-light); }
    .btn-save {
      flex: 2; padding: 0.75rem; background: var(--ink); color: var(--parch-light);
      border: 1px solid var(--gold); font-family: 'Cinzel Decorative', serif;
      font-size: 0.6rem; letter-spacing: 0.2rem; text-transform: uppercase;
      cursor: pointer; position: relative; transition: background 0.3s;
    }
    .btn-save::before { content: ''; position: absolute; inset: 2px; border: 1px solid var(--gold); opacity: 0.3; pointer-events: none; }
    .btn-save:hover { background: #1a0a00; }

    footer { text-align: center; margin-top: 3rem; color: var(--sepia); font-style: italic; font-size: 0.8rem; opacity: 0.5; }
  </style>
</head>
<body>

<header>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
  <h1 class="site-title">Bestiaire</h1>
  <p class="site-subtitle">Livre de l'Éclypse</p>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
</header>

<div class="nav-bar">
  <a class="btn-back" href="/Grimoire/menu.html">Retour au menu</a>
  <button class="btn-new" onclick="openModal()">Créer une fiche</button>
</div>

<div class="grid-container">
  <div class="loading-msg" id="loadingMsg">Consultation des archives...</div>
  <div class="beast-grid" id="beastGrid"></div>
</div>

<footer>&#10022; &nbsp; Que chaque être soit consigné avec respect &nbsp; &#10022;</footer>

<!-- ===== DETAIL VIEW ===== -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-modal" id="detailModal">
    <button class="btn-close-detail" onclick="closeDetail()">Fermer</button>
    <div id="detailContent"></div>
  </div>
</div>

<!-- ===== MODAL CREATION ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-corner tl"></div>
    <div class="modal-corner tr"></div>
    <div class="modal-corner bl"></div>
    <div class="modal-corner br"></div>

    <div class="modal-title">Nouvelle Fiche</div>
    <div class="modal-divider">&#8212; &#10022; &#8212;</div>

    <div class="section-title">Identité</div>
    <div class="form-row">
      <div class="field">
        <label for="f-nom">Nom</label>
        <input type="text" id="f-nom" placeholder="Nom de l'être..."/>
      </div>
      <div class="field">
        <label for="f-type">Type</label>
        <select id="f-type">
          <option value="">— Choisir —</option>
          <option>Créature</option>
          <option>Esprit</option>
          <option>Déité</option>
          <option>Fée / Fae</option>
          <option>Démon</option>
          <option>Ancêtre</option>
          <option>Gardien</option>
          <option>Animal Totem</option>
        </select>
      </div>
    </div>
    <div class="form-row single">
      <div class="field">
        <label for="f-origine">Origine / Mythologie</label>
        <input type="text" id="f-origine" placeholder="Ex: Mythologie celtique, Folklore nordique..."/>
      </div>
    </div>

    <div class="section-title">Description</div>
    <div class="form-row single">
      <div class="field">
        <label for="f-physique">Description physique</label>
        <textarea id="f-physique" placeholder="Apparence, forme, taille..."></textarea>
      </div>
    </div>
    <div class="form-row single">
      <div class="field">
        <label for="f-caractere">Caractère & comportement</label>
        <textarea id="f-caractere" placeholder="Nature, tempérament, intentions..."></textarea>
      </div>
    </div>

    <div class="section-title">Attributs magiques</div>
    <div class="form-row single">
      <div class="field">
        <label for="f-pouvoirs">Pouvoirs & attributs</label>
        <textarea id="f-pouvoirs" placeholder="Capacités, domaines d'influence..."></textarea>
      </div>
    </div>
    <div class="form-row single">
      <div class="field">
        <label for="f-correspondances">Correspondances magiques</label>
        <textarea id="f-correspondances" placeholder="Éléments, planètes, cristaux, plantes associés..."></textarea>
      </div>
    </div>
    <div class="form-row single">
      <div class="field">
        <label for="f-interagir">Comment interagir / invoquer</label>
        <textarea id="f-interagir" placeholder="Rituels, offrandes, précautions..."></textarea>
      </div>
    </div>

    <div class="section-title">Notes</div>
    <div class="form-row single">
      <div class="field">
        <label for="f-notes">Notes libres</label>
        <textarea id="f-notes" placeholder="Expériences personnelles, observations..."></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btnSave" onclick="saveEntry()">Sceller la fiche</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvStmkk99Z063MPHLlmeUywafIMGCTSAM",
    authDomain: "grimoire-commun.firebaseapp.com",
    projectId: "grimoire-commun",
    storageBucket: "grimoire-commun.firebasestorage.app",
    messagingSenderId: "401518708387",
    appId: "1:401518708387:web:2ca15dd180798dc28e2116",
    measurementId: "G-F0HFZG2H79"
  };

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);

  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = '/Grimoire/'; return; }
    loadEntries();
  });

  async function loadEntries() {
    const grid    = document.getElementById('beastGrid');
    const loading = document.getElementById('loadingMsg');
    try {
      const q    = query(collection(db, 'bestiaire'), orderBy('nom'));
      const snap = await getDocs(q);
      loading.style.display = 'none';
      if (snap.empty) {
        grid.innerHTML = '<div class="empty-state">Le bestiaire est vide.<br/><em>Consigne le premier être.</em></div>';
        return;
      }
      grid.innerHTML = '';
      snap.forEach(docSnap => grid.appendChild(buildCard(docSnap.data(), docSnap.id)));
    } catch(e) {
      loading.textContent = 'Erreur lors du chargement.';
      console.error(e);
    }
  }

  function buildCard(d, id) {
    const card = document.createElement('div');
    card.className = 'beast-card';
    card.onclick = (e) => { if (!e.target.classList.contains('btn-delete')) openDetail(d); };

    card.innerHTML = `
      <div class="beast-body">
        ${d.type ? `<div class="beast-type">${d.type}</div>` : ''}
        <div class="beast-name">${d.nom || '—'}</div>
        ${d.origine ? `<div class="beast-origine">${d.origine}</div>` : ''}
        ${d.physique ? `<div class="beast-desc">${d.physique}</div>` : ''}
      </div>
      <button class="btn-delete" onclick="deleteEntry('${id}', this)">Supprimer</button>`;
    return card;
  }

  window.openDetail = function(d) {
    let html = '';
    if (d.type) html += `<div class="detail-type">${d.type}</div>`;
    html += `<div class="detail-name">${d.nom || '—'}</div>`;
    if (d.origine) html += `<div class="detail-origine">${d.origine}</div>`;
    html += `<hr class="detail-divider"/>`;

    const sections = [
      { label: 'Description physique',        key: 'physique' },
      { label: 'Caractère & comportement',    key: 'caractere' },
      { label: 'Pouvoirs & attributs',        key: 'pouvoirs' },
      { label: 'Correspondances magiques',    key: 'correspondances' },
      { label: 'Comment interagir / invoquer',key: 'interagir' },
      { label: 'Notes libres',                key: 'notes' },
    ];
    sections.forEach(s => {
      if (d[s.key]) html += `<div class="detail-section"><div class="detail-label">${s.label}</div><div class="detail-content">${d[s.key]}</div></div>`;
    });

    document.getElementById('detailContent').innerHTML = html;
    document.getElementById('detailOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeDetail = function() {
    document.getElementById('detailOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.saveEntry = async function() {
    const nom = document.getElementById('f-nom').value.trim();
    if (!nom) { alert('Le nom est obligatoire.'); return; }

    const btn = document.getElementById('btnSave');
    btn.textContent = 'Scellement en cours…';
    btn.style.opacity = '0.7';

    const entry = {
      nom:              nom,
      type:             document.getElementById('f-type').value,
      origine:          document.getElementById('f-origine').value,
      physique:         document.getElementById('f-physique').value,
      caractere:        document.getElementById('f-caractere').value,
      pouvoirs:         document.getElementById('f-pouvoirs').value,
      correspondances:  document.getElementById('f-correspondances').value,
      interagir:        document.getElementById('f-interagir').value,
      notes:            document.getElementById('f-notes').value,
      createdAt: new Date().toISOString()
    };

    try {
      await addDoc(collection(db, 'bestiaire'), entry);
      closeModal();
      loadEntries();
    } catch(e) {
      console.error(e);
      alert('Erreur lors de la sauvegarde.');
    }
    btn.textContent = 'Sceller la fiche';
    btn.style.opacity = '1';
  };

  window.deleteEntry = async function(id, btnEl) {
    if (!confirm('Supprimer cette fiche définitivement ?')) return;
    try {
      await deleteDoc(doc(db, 'bestiaire', id));
      btnEl.closest('.beast-card').remove();
    } catch(e) { console.error(e); }
  };

  window.openModal = function() {
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeModal = function() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay')) closeDetail();
  });
</script>

</body>
</html>
