<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grimoire — Astrologie</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--parch-light:#f5e9c9;--parch-dark:#c9a96e;--ink:#2c1a0e;--ink-faded:#5c3d1e;--sepia:#8b5e2a;--gold:#b8860b;--red-wax:#7a1f1f;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background-color:#120a02;background-image:radial-gradient(ellipse at 50% 30%,#2a1205 0%,transparent 70%);font-family:'IM Fell English',Georgia,serif;color:var(--ink);padding:2rem 1rem 4rem;}
    header{text-align:center;padding:2rem 1rem 1rem;}
    .header-divider{color:var(--gold);opacity:0.6;letter-spacing:0.6rem;font-size:0.9rem;}
    .site-title{font-family:'UnifrakturMaguntia',cursive;font-size:clamp(2rem,5vw,3.5rem);color:#f5e9c9;text-shadow:0 0 30px rgba(180,120,30,0.5),2px 2px 0 #1a0a00;margin:0.3rem 0;}
    .site-subtitle{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.4rem;color:var(--parch-dark);text-transform:uppercase;}
    .nav-bar{max-width:1000px;margin:1.5rem auto;display:flex;justify-content:space-between;align-items:center;padding:0 1rem;}
    .btn-back{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;border:1px solid var(--sepia);padding:0.5rem 1.2rem;cursor:pointer;transition:all 0.3s;text-decoration:none;display:inline-block;background:transparent;color:var(--sepia);}
    .btn-back:hover{background:var(--sepia);color:#f5e9c9;}
    /* Tabs */
    .tabs{max-width:1000px;margin:0 auto 2rem;padding:0 1rem;display:flex;border-bottom:1px solid var(--parch-dark);}
    .tab-btn{font-family:'Cinzel Decorative',serif;font-size:0.58rem;letter-spacing:0.12rem;text-transform:uppercase;padding:0.7rem 1.2rem;cursor:pointer;background:transparent;border:none;color:var(--parch-dark);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.3s;}
    .tab-btn:hover{color:var(--sepia);}
    .tab-btn.active{color:#f5e9c9;border-bottom-color:var(--gold);}
    .tab-panel{display:none;max-width:1000px;margin:0 auto;padding:0 0.5rem;}
    .tab-panel.active{display:block;}
    .btn-new-inline{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;border:1px solid var(--gold);padding:0.5rem 1.2rem;cursor:pointer;transition:all 0.3s;background:var(--ink);color:#f5e9c9;position:relative;}
    .btn-new-inline::before{content:'';position:absolute;inset:2px;border:1px solid var(--gold);opacity:0.3;pointer-events:none;}
    .btn-new-inline:hover{background:#1a0a00;}
    /* Thème natal card */
    .natal-card{background:linear-gradient(145deg,#f5e9c9 0%,#ecdaaa 100%);border:1px solid var(--parch-dark);box-shadow:3px 3px 0 rgba(0,0,0,0.4);padding:2rem;position:relative;}
    .natal-card::after{content:'';position:absolute;top:6px;right:6px;width:18px;height:18px;border-top:1.5px solid var(--gold);border-right:1.5px solid var(--gold);opacity:0.4;}
    .natal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-top:1rem;}
    .natal-item{border-bottom:1px solid var(--parch-dark);padding-bottom:0.6rem;}
    .natal-item-label{font-family:'Cinzel Decorative',serif;font-size:0.52rem;letter-spacing:0.12rem;color:var(--sepia);text-transform:uppercase;margin-bottom:0.2rem;}
    .natal-item-val{font-size:0.92rem;color:var(--ink-faded);font-style:italic;}
    /* Entries */
    .loading-msg{text-align:center;color:var(--parch-dark);font-style:italic;margin:3rem 0;}
    .entries-list{display:flex;flex-direction:column;gap:1.5rem;}
    .entry-card{background:linear-gradient(145deg,#f5e9c9 0%,#ecdaaa 100%);border:1px solid var(--parch-dark);box-shadow:3px 3px 0 rgba(0,0,0,0.4);padding:1.8rem 2rem 2.5rem;position:relative;animation:card-in 0.5s ease both;transition:transform 0.2s,box-shadow 0.2s;}
    .entry-card:hover{transform:translateY(-2px);box-shadow:5px 6px 0 rgba(0,0,0,0.5);}
    .entry-card::after{content:'';position:absolute;top:6px;right:6px;width:18px;height:18px;border-top:1.5px solid var(--gold);border-right:1.5px solid var(--gold);opacity:0.4;}
    .entry-date{font-family:'Cinzel Decorative',serif;font-size:0.65rem;letter-spacing:0.12rem;color:var(--sepia);text-transform:uppercase;margin-bottom:0.5rem;}
    .entry-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem;}
    .entry-tag{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.12rem;color:var(--ink-faded);border:1px solid var(--parch-dark);padding:0.2rem 0.6rem;text-transform:uppercase;}
    .entry-divider{border:none;border-top:1px solid var(--parch-dark);margin:0.8rem 0;opacity:0.5;}
    .entry-section{margin-bottom:0.8rem;}
    .entry-section-label{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;margin-bottom:0.25rem;}
    .entry-section-content{font-size:0.92rem;color:var(--ink-faded);line-height:1.6;font-style:italic;white-space:pre-wrap;}
    .btn-delete{position:absolute;bottom:0.8rem;right:1rem;background:transparent;border:1px solid var(--red-wax);color:var(--red-wax);font-family:'Cinzel Decorative',serif;font-size:0.5rem;letter-spacing:0.1rem;padding:0.25rem 0.6rem;cursor:pointer;text-transform:uppercase;opacity:0.4;transition:opacity 0.3s;}
    .btn-delete:hover{opacity:1;}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--parch-dark);font-style:italic;}
    @keyframes card-in{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    /* Lib planètes */
    .lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
    .lib-card{background:linear-gradient(145deg,#f5e9c9 0%,#ecdaaa 100%);border:1px solid var(--parch-dark);padding:1rem 1.2rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
    .lib-card:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(0,0,0,0.4);}
    .lib-card.filled{border-left:2px solid var(--gold);}
    .lib-card-name{font-family:'Cinzel Decorative',serif;font-size:0.65rem;letter-spacing:0.1rem;color:var(--ink);text-transform:uppercase;margin-bottom:0.2rem;}
    .lib-card-sub{font-size:0.78rem;color:var(--ink-faded);font-style:italic;}
    /* Detail overlay */
    .detail-overlay{display:none;position:fixed;inset:0;background:rgba(10,5,0,0.88);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
    .detail-overlay.open{display:flex;}
    .detail-modal{background:linear-gradient(160deg,#fdf3d8 0%,#f0dca8 40%,#e4c98a 100%);border:1px solid var(--parch-dark);box-shadow:0 0 0 4px #1a0f05,0 0 0 6px var(--sepia);width:100%;max-width:600px;padding:2.5rem 2rem;position:relative;animation:page-in 0.3s ease both;}
    .detail-name{font-family:'UnifrakturMaguntia',cursive;font-size:2rem;color:var(--ink);margin-bottom:1rem;}
    .detail-field{margin-bottom:1rem;}
    .detail-field label{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;display:block;margin-bottom:0.3rem;}
    .detail-field textarea{width:100%;background:rgba(255,255,255,0.4);border:1.5px solid var(--parch-dark);padding:0.5rem;font-family:'IM Fell English',serif;font-size:0.9rem;color:var(--ink);outline:none;resize:vertical;min-height:80px;}
    .detail-field textarea:focus{border-color:var(--gold);}
    .btn-close{position:absolute;top:1rem;right:1rem;background:transparent;border:1px solid var(--sepia);color:var(--sepia);font-family:'Cinzel Decorative',serif;font-size:0.5rem;letter-spacing:0.1rem;padding:0.3rem 0.7rem;cursor:pointer;text-transform:uppercase;transition:all 0.2s;}
    .btn-close:hover{background:var(--sepia);color:#f5e9c9;}
    .btn-save-detail{width:100%;margin-top:1rem;padding:0.75rem;background:var(--ink);color:#f5e9c9;border:1px solid var(--gold);font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.2rem;text-transform:uppercase;cursor:pointer;transition:background 0.3s;}
    .btn-save-detail:hover{background:#1a0a00;}
    /* Modals */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,5,0,0.85);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
    .modal-overlay.open{display:flex;}
    .modal{background:linear-gradient(160deg,#fdf3d8 0%,#f0dca8 40%,#e4c98a 100%);border:1px solid var(--parch-dark);box-shadow:0 0 0 4px #1a0f05,0 0 0 6px var(--sepia);width:100%;max-width:680px;padding:2.5rem 2rem;position:relative;animation:page-in 0.4s ease both;}
    @keyframes page-in{from{opacity:0;transform:translateY(20px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
    .modal-corner{position:absolute;width:36px;height:36px;border-color:var(--gold);border-style:solid;opacity:0.5;}
    .modal-corner.tl{top:8px;left:8px;border-width:1.5px 0 0 1.5px;}.modal-corner.tr{top:8px;right:8px;border-width:1.5px 1.5px 0 0;}.modal-corner.bl{bottom:8px;left:8px;border-width:0 0 1.5px 1.5px;}.modal-corner.br{bottom:8px;right:8px;border-width:0 1.5px 1.5px 0;}
    .modal-title{font-family:'UnifrakturMaguntia',cursive;font-size:2rem;color:var(--ink);text-align:center;margin-bottom:0.3rem;}
    .modal-divider{text-align:center;color:var(--sepia);opacity:0.5;letter-spacing:0.4rem;margin-bottom:2rem;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
    .form-row.single{grid-template-columns:1fr;}
    .field{display:flex;flex-direction:column;gap:0.3rem;}
    .field label{font-family:'Cinzel Decorative',serif;font-size:0.55rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;}
    .field input,.field select,.field textarea{background:rgba(255,255,255,0.4);border:none;border-bottom:1.5px solid var(--parch-dark);padding:0.45rem 0.3rem;font-family:'IM Fell English',serif;font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.3s;width:100%;}
    .field select{cursor:pointer;}.field input:focus,.field select:focus,.field textarea:focus{border-bottom-color:var(--gold);}
    .field textarea{resize:vertical;min-height:80px;border:1.5px solid var(--parch-dark);padding:0.5rem;}.field textarea:focus{border-color:var(--gold);}
    .section-title{font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.2rem;color:var(--sepia);text-transform:uppercase;margin:1.5rem 0 0.8rem;padding-bottom:0.3rem;border-bottom:1px solid var(--parch-dark);}
    .modal-actions{display:flex;gap:1rem;margin-top:2rem;}
    .btn-cancel{flex:1;padding:0.75rem;background:transparent;border:1px solid var(--sepia);color:var(--sepia);font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
    .btn-cancel:hover{background:var(--sepia);color:#f5e9c9;}
    .btn-save{flex:2;padding:0.75rem;background:var(--ink);color:#f5e9c9;border:1px solid var(--gold);font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.2rem;text-transform:uppercase;cursor:pointer;position:relative;transition:background 0.3s;}
    .btn-save::before{content:'';position:absolute;inset:2px;border:1px solid var(--gold);opacity:0.3;pointer-events:none;}
    .btn-save:hover{background:#1a0a00;}
    footer{text-align:center;margin-top:3rem;color:var(--sepia);font-style:italic;font-size:0.8rem;opacity:0.5;}
  </style>
</head>
<body>
<header>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
  <h1 class="site-title">Astrologie</h1>
  <p class="site-subtitle">Livre de l'&Eacute;clypse</p>
  <div class="header-divider">&#8212; &#10022; &#10022; &#10022; &#8212;</div>
</header>
<div class="nav-bar">
  <a class="btn-back" href="/Grimoire/menu.html">Retour au menu</a>
</div>
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('natal')">Th&egrave;me Natal</button>
  <button class="tab-btn" onclick="switchTab('transits')">Transits &amp; Journal
    <span style="margin-left:0.6rem;font-size:0.5rem;padding:0.2rem 0.5rem;border:1px solid var(--gold);color:var(--gold);cursor:pointer;vertical-align:middle" onclick="event.stopPropagation();openModal()">+ Nouveau</span>
  </button>
  <button class="tab-btn" onclick="switchTab('library')">Planètes &amp; Maisons</button>
</div>

<!-- NATAL -->
<div class="tab-panel active" id="panel-natal">
  <div style="display:flex;gap:1.2rem;flex-wrap:wrap;">
    <div class="natal-card" style="flex:1;min-width:280px">
      <div style="font-family:'Cinzel Decorative',serif;font-size:0.7rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;margin-bottom:1rem">Th&egrave;me de Soleil</div>
      <div class="natal-grid" id="natalGrid1"></div>
      <button style="margin-top:1.5rem;font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;border:1px solid var(--gold);padding:0.5rem 1.2rem;background:var(--ink);color:#f5e9c9;cursor:pointer;" onclick="openNatalModal(1)">Modifier</button>
    </div>
    <div class="natal-card" style="flex:1;min-width:280px">
      <div style="font-family:'Cinzel Decorative',serif;font-size:0.7rem;letter-spacing:0.15rem;color:var(--sepia);text-transform:uppercase;margin-bottom:1rem">Th&egrave;me de Lune</div>
      <div class="natal-grid" id="natalGrid2"></div>
      <button style="margin-top:1.5rem;font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;text-transform:uppercase;border:1px solid var(--gold);padding:0.5rem 1.2rem;background:var(--ink);color:#f5e9c9;cursor:pointer;" onclick="openNatalModal(2)">Modifier</button>
    </div>
  </div>
</div>

<!-- TRANSITS -->
<div class="tab-panel" id="panel-transits">
  <div class="loading-msg" id="loadingTransits">Consultation des archives...</div>
  <div class="entries-list" id="listTransits"></div>
</div>

<!-- LIBRARY -->
<div class="tab-panel" id="panel-library">
  <div style="font-family:'Cinzel Decorative',serif;font-size:0.6rem;letter-spacing:0.15rem;color:var(--parch-dark);text-transform:uppercase;margin-bottom:1rem">Cliquer pour noter la signification personnelle</div>
  <div class="lib-grid" id="libGrid"></div>
</div>

<footer>&#10022; &nbsp; Les astres parlent à qui sait les écouter &nbsp; &#10022;</footer>

<!-- DETAIL LIBRARY -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-modal">
    <button class="btn-close" onclick="closeDetail()">Fermer</button>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-field"><label>Signification personnelle</label><textarea id="detailSig" placeholder="Ce que cet astre ou cette maison représente pour toi..."></textarea></div>
    <div class="detail-field"><label>Notes</label><textarea id="detailNotes" placeholder="Observations, ressentis..."></textarea></div>
    <button class="btn-save-detail" onclick="saveLibItem()">Enregistrer</button>
  </div>
</div>

<!-- MODAL NATAL -->
<div class="modal-overlay" id="modal-natal">
  <div class="modal">
    <div class="modal-corner tl"></div><div class="modal-corner tr"></div><div class="modal-corner bl"></div><div class="modal-corner br"></div>
    <div class="modal-title" id="natalModalTitle">Th&egrave;me Natal</div>
    <div class="modal-divider">&#8212; &#10022; &#8212;</div>
    <div class="section-title">Signes</div>
    <div class="form-row">
      <div class="field"><label for="n-soleil">Signe Solaire</label><input type="text" id="n-soleil" placeholder="Ex: Lion..."/></div>
      <div class="field"><label for="n-ascendant">Ascendant</label><input type="text" id="n-ascendant" placeholder="Ex: Scorpion..."/></div>
    </div>
    <div class="form-row">
      <div class="field"><label for="n-lune">Lune</label><input type="text" id="n-lune" placeholder="Ex: Vierge..."/></div>
      <div class="field"><label for="n-mercure">Mercure</label><input type="text" id="n-mercure" placeholder="Ex: Cancer..."/></div>
    </div>
    <div class="form-row">
      <div class="field"><label for="n-venus">V&eacute;nus</label><input type="text" id="n-venus" placeholder=""/></div>
      <div class="field"><label for="n-mars">Mars</label><input type="text" id="n-mars" placeholder=""/></div>
    </div>
    <div class="form-row">
      <div class="field"><label for="n-jupiter">Jupiter</label><input type="text" id="n-jupiter" placeholder=""/></div>
      <div class="field"><label for="n-saturne">Saturne</label><input type="text" id="n-saturne" placeholder=""/></div>
    </div>
    <div class="section-title">Notes</div>
    <div class="form-row single">
      <div class="field"><label for="n-notes">Notes libres</label><textarea id="n-notes" placeholder="Aspects importants, stellium, dominantes..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNatalModal()">Annuler</button>
      <button class="btn-save" onclick="saveNatal()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL TRANSIT -->
<div class="modal-overlay" id="modal-transit">
  <div class="modal">
    <div class="modal-corner tl"></div><div class="modal-corner tr"></div><div class="modal-corner bl"></div><div class="modal-corner br"></div>
    <div class="modal-title">Nouveau Transit</div>
    <div class="modal-divider">&#8212; &#10022; &#8212;</div>
    <div class="section-title">Contexte</div>
    <div class="form-row">
      <div class="field"><label for="t-date">Date</label><input type="date" id="t-date"/></div>
      <div class="field"><label for="t-planetes">Plan&egrave;tes en transit</label><input type="text" id="t-planetes" placeholder="Ex: Mercure rétrograde, Saturne..."/></div>
    </div>
    <div class="section-title">Contenu</div>
    <div class="form-row single">
      <div class="field"><label for="t-transits">Transits du moment</label><textarea id="t-transits" placeholder="Position des planètes, aspects en cours..."></textarea></div>
    </div>
    <div class="form-row single">
      <div class="field"><label for="t-ressenti">Ressenti &amp; observations</label><textarea id="t-ressenti" placeholder="Comment ces énergies se manifestent dans ta vie..."></textarea></div>
    </div>
    <div class="form-row single">
      <div class="field"><label for="t-notes">Notes libres</label><textarea id="t-notes" placeholder="Intuitions, synchronicités..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btnSaveTransit" onclick="saveTransit()">Sceller la fiche</button>
    </div>
  </div>
</div>

<script type="module">
        const fc={apiKey:"AIzaSyBvStmkk99Z063MPHLlmeUywafIMGCTSAM",authDomain:"grimoire-commun.firebaseapp.com",projectId:"grimoire-commun",storageBucket:"grimoire-commun.firebasestorage.app",messagingSenderId:"401518708387",appId:"1:401518708387:web:2ca15dd180798dc28e2116",measurementId:"G-F0HFZG2H79"};
  const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);

  const ASTRES=['Soleil','Lune','Mercure','Vénus','Mars','Jupiter','Saturne','Uranus','Neptune','Pluton','Chiron','Noeud Nord','Noeud Sud'];
  const MAISONS=['Maison 1 — Identité','Maison 2 — Valeurs','Maison 3 — Communication','Maison 4 — Foyer','Maison 5 — Créativité','Maison 6 — Santé','Maison 7 — Relations','Maison 8 — Transformation','Maison 9 — Philosophie','Maison 10 — Carrière','Maison 11 — Communauté','Maison 12 — Inconscient'];

  let currentLibKey=null;

  auth.onAuthStateChanged(u=>{if(!u){window.location.href='/Grimoire/';return;}loadNatal();loadTransits();loadLibrary();});

  window.switchTab=function(tab){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
    const idx=['natal','transits','library'].indexOf(tab);
    document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  };

  // NATAL
  let currentNatalProfile = 1;
  const NATAL_FIELDS = [['Signe Solaire','soleil'],['Ascendant','ascendant'],['Lune','lune'],['Mercure','mercure'],['Vénus','venus'],['Mars','mars'],['Jupiter','jupiter'],['Saturne','saturne'],['Notes','notes']];

  async function loadNatal(){
    try{
      for(const num of [1,2]){
        const snap=await db.collection('astrologie').doc('natal'+num).get();
        const d=snap.exists?snap.data():{};
        const grid=document.getElementById('natalGrid'+num);
        grid.innerHTML=NATAL_FIELDS.map(([l,k])=>d[k]?`<div class="natal-item"><div class="natal-item-label">${l}</div><div class="natal-item-val">${d[k]}</div></div>`:'').join('');
        if(!grid.innerHTML) grid.innerHTML='<div style="color:var(--parch-dark);font-style:italic;font-size:0.9rem">Thème non renseigné — clique sur Modifier.</div>';
      }
    }catch(e){console.error(e);}
  }
  window.openNatalModal=function(num){
    currentNatalProfile=num;
    const name=num===1?'Soleil':'Lune';
    document.getElementById('natalModalTitle').textContent='Thème de '+name;
    // Prefill
    getDoc(doc(db,'astrologie','natal'+num)).then(snap=>{
      const d=snap.exists?snap.data():{};
      NATAL_FIELDS.forEach(([,k])=>{const el=document.getElementById('n-'+k);if(el)el.value=d[k]||'';});
    });
    document.getElementById('modal-natal').classList.add('open');
    document.body.style.overflow='hidden';
  };
  window.closeNatalModal=function(){document.getElementById('modal-natal').classList.remove('open');document.body.style.overflow='';};
  window.saveNatal=async function(){
    const data={};
    NATAL_FIELDS.forEach(([,k])=>{const el=document.getElementById('n-'+k);if(el)data[k]=el.value;});
    try{await db.collection('astrologie').doc('natal'+currentNatalProfile).set(data);closeNatalModal();loadNatal();}catch(e){console.error(e);alert('Erreur.');}
  };

  // TRANSITS
  async function loadTransits(){
    const list=document.getElementById('listTransits'),loading=document.getElementById('loadingTransits');
    try{
      const snap=await db.collection('astrologie_transits').orderBy('date','desc').get();
      loading.style.display='none';
      if(snap.empty){list.innerHTML='<div class="empty-state">Aucun transit consigné.</div>';return;}
      list.innerHTML='';snap.forEach(d=>list.appendChild(buildCard(d.data(),d.id)));
    }catch(e){loading.textContent='Erreur.';console.error(e);}
  }
  function buildCard(d,id){
    const card=document.createElement('div');card.className='entry-card';
    const dateStr=d.date?new Date(d.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}):'—';
    let html=`<div class="entry-date">${dateStr}</div>`;
    if(d.planetes) html+=`<div class="entry-tags"><span class="entry-tag">${d.planetes}</span></div>`;
    html+=`<hr class="entry-divider"/>`;
    [{label:'Transits',key:'transits'},{label:'Ressenti',key:'ressenti'},{label:'Notes',key:'notes'}].forEach(s=>{
      if(d[s.key]) html+=`<div class="entry-section"><div class="entry-section-label">${s.label}</div><div class="entry-section-content">${d[s.key]}</div></div>`;
    });
    html+=`<button class="btn-delete" onclick="deleteTransit('${id}',this)">Supprimer</button>`;
    card.innerHTML=html;return card;
  }
  window.deleteTransit=async function(id,b){if(!confirm('Supprimer ?'))return;try{await db.collection('astrologie_transits').doc(id).delete();b.closest('.entry-card').remove();}catch(e){console.error(e);}};
  window.openModal=function(){document.getElementById('t-date').value=new Date().toISOString().split('T')[0];document.getElementById('modal-transit').classList.add('open');document.body.style.overflow='hidden';};
  window.closeModal=function(){document.getElementById('modal-transit').classList.remove('open');document.body.style.overflow='';};
  window.saveTransit=async function(){
    const btn=document.getElementById('btnSaveTransit');btn.textContent='Scellement...';btn.style.opacity='0.7';
    const entry={date:document.getElementById('t-date').value,planetes:document.getElementById('t-planetes').value,transits:document.getElementById('t-transits').value,ressenti:document.getElementById('t-ressenti').value,notes:document.getElementById('t-notes').value,createdAt:new Date().toISOString()};
    try{await db.collection('astrologie_transits').add(entry);closeModal();loadTransits();}catch(e){console.error(e);alert('Erreur.');}
    btn.textContent='Sceller la fiche';btn.style.opacity='1';
  };

  // LIBRARY
  async function loadLibrary(){
    const snap=await getDocs(db.collection('astrologie_lib'));
    const saved={};snap.forEach(d=>saved[d.id]=d.data());
    const grid=document.getElementById('libGrid');grid.innerHTML='';
    [...ASTRES,...MAISONS].forEach(nom=>{
      const key='astro_'+nom;
      const card=document.createElement('div');
      const filled=saved[key]&&(saved[key].signification||saved[key].notes);
      card.className='lib-card'+(filled?' filled':'');
      card.innerHTML=`<div class="lib-card-name">${nom}</div><div class="lib-card-sub">${ASTRES.includes(nom)?'Planète / Astre':'Maison astrologique'}${filled?' — noté':''}</div>`;
      card.onclick=()=>openDetail(key,nom,saved[key]||{});
      grid.appendChild(card);
    });
  }
  window.openDetail=function(key,nom,data){
    currentLibKey=key;
    document.getElementById('detailName').textContent=nom;
    document.getElementById('detailSig').value=data.signification||'';
    document.getElementById('detailNotes').value=data.notes||'';
    document.getElementById('detailOverlay').classList.add('open');document.body.style.overflow='hidden';
  };
  window.closeDetail=function(){document.getElementById('detailOverlay').classList.remove('open');document.body.style.overflow='';};
  window.saveLibItem=async function(){
    if(!currentLibKey)return;
    try{await db.collection('astrologie_lib').doc(currentLibKey).set({signification:document.getElementById('detailSig').value,notes:document.getElementById('detailNotes').value});closeDetail();loadLibrary();}catch(e){console.error(e);alert('Erreur.');}
  };

  ['modal-natal','modal-transit'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{if(e.target===document.getElementById(id)){if(id==='modal-natal')closeNatalModal();else closeModal();}});
  });
  document.getElementById('detailOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('detailOverlay'))closeDetail();});
</script>
</body>
</html>
